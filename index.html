<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsday Farm Bot | Pricing Plans</title>
    <style>
        :root { --main: #ff4500; --bg: #0b0b0b; --card: #1a1a1a; --accent: #ffd700; }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; }

        table { width: 100%; border-collapse: collapse; margin: 30px 0; background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #333; }

        .highlight { color: var(--accent); font-weight: bold; font-size: 1.3rem; }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }

        .buy-btn:hover { transform: scale(1.05); background: #20ba5a; }
        .dl-btn { background: #444; color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .dl-btn:hover { background: #555; }
