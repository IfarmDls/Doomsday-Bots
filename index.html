<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsday Farm Bot | Official Store</title>
    <style>
        :root { 
            --main: #ff4500; 
            --bg: #0b0b0b; 
            --card: #1a1a1a; 
            --accent: #ffd700; 
            --discord: #5865F2; 
            --tele: #0088cc; 
            --mumu: #3498db; 
        }
        body { 
            background-color: var(--bg); 
            color: #eeeeee; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
        }
        .main-layout {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        /* Side Sections */
        .side-panel {
            flex: 1;
            min-width: 250px;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* Center Content */
        .container { 
            flex: 2;
            min-width: 400px;
            max-width: 800px;
        }
        .hero { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center;
        }
        h1 { color: var(--main); margin: 0; font-size: 2.2rem; text-transform: uppercase; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        th { background: #333; color: white; padding: 12px; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        .price-euro { color: var(--accent); font-weight: bold; }
